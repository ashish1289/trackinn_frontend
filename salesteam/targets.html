<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Targets & Incentives — TRACKINN</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/user.css">
    <link rel="stylesheet" href="../assets/css/salesteam.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="user-body sales-body">
    <!-- Sidebar -->
    <aside class="sales-sidebar">
        <div class="sales-sidebar-header">
            <span style="font-weight: 800; font-size: 1.1rem; letter-spacing: 0.5px;">SALES<em>.</em></span>
            <button class="btn btn-ghost btn-sm close-sidebar" style="width: auto; padding: 4px 8px;"><i
                    class="fas fa-times"></i></button>
        </div>
        <nav class="sales-sidebar-body">
            <a href="dashboard.html" class="s-nav-item">
                <i class="fas fa-home s-nav-icon"></i> Home
            </a>
            <a href="onboarding.html" class="s-nav-item">
                <i class="fas fa-plus-circle s-nav-icon"></i> Onboard
            </a>
            <a href="tracking.html" class="s-nav-item">
                <i class="fas fa-map-marker-alt s-nav-icon"></i> Tracking
            </a>
            <a href="targets.html" class="s-nav-item active">
                <i class="fas fa-award s-nav-icon"></i> Incentives
            </a>
            <div class="divider"></div>
            <a href="../index.html" class="s-nav-item">
                <i class="fas fa-sign-out-alt s-nav-icon"></i> Logout
            </a>
        </nav>
    </aside>
    <div class="sidebar-overlay"></div>
    <header class="user-header">
        <button class="btn btn-ghost btn-sm open-sidebar"
            style="border:none; font-size: 1.2rem; padding: 4px; margin-right: 12px;"><i
                class="fas fa-bars"></i></button>
        <div class="user-header-logo">
            <div class="logo-dot" style="background: linear-gradient(135deg, var(--secondary), var(--accent));">I</div>
            <span>INCENTIVES</span>
        </div>
    </header>

    <main class="user-page">
        <section class="target-card animate-fade">
            <div class="flex justify-between items-center">
                <span class="section-label" style="color: #fff; opacity: 0.8;">Monthly Target</span>
                <span style="font-size: 0.75rem; color: #fff;">Feb 2026</span>
            </div>
            <div class="progress-ring-container">
                <div class="reward-ring-wrap">
                    <svg width="140" height="140">
                        <circle cx="70" cy="70" r="60" fill="transparent" stroke="rgba(255,255,255,0.1)"
                            stroke-width="8"></circle>
                        <circle cx="70" cy="70" r="60" fill="transparent" stroke="var(--accent)" stroke-width="8"
                            stroke-dasharray="376" stroke-dashoffset="113"></circle>
                    </svg>
                    <div class="reward-ring-center">
                        <div class="ring-points" style="color: #fff;">70%</div>
                        <div class="ring-label" style="color: #fff; opacity: 0.7;">Achieved</div>
                    </div>
                </div>
            </div>
            <div class="flex justify-between text-center mt-2">
                <div>
                    <div style="font-size: 1.1rem; font-weight: 800; color: #fff;">14 / 20</div>
                    <div style="font-size: 0.65rem; color: #fff; opacity: 0.7;">Hotels Onboarded</div>
                </div>
                <div style="width: 1px; background: rgba(255,255,255,0.2);"></div>
                <div>
                    <div style="font-size: 1.1rem; font-weight: 800; color: #fff;">3.2%</div>
                    <div style="font-size: 0.65rem; color: #fff; opacity: 0.7;">Conversion Ratio</div>
                </div>
            </div>
        </section>

        <section class="mt-3 animate-fade" style="animation-delay: 0.1s;">
            <h3 class="mb-2">Commission Calculator</h3>
            <div class="onboarding-card">
                <div class="form-group">
                    <label class="form-label">Hotels to Onboard</label>
                    <input type="number" id="hotelsOnboarded" class="form-control" placeholder="0">
                </div>
                <div class="form-group">
                    <label class="form-label">Expected Revenue (₹)</label>
                    <input type="number" id="revenueGenerated" class="form-control" placeholder="0">
                </div>
                <button id="calculateIncentive" class="btn btn-outline w-full">Calculate Payout</button>

                <div class="commission-calc">
                    <div class="calc-row">
                        <span>Base Incentive</span>
                        <span>₹15,000</span>
                    </div>
                    <div class="calc-row">
                        <span>Bonus (Predicted)</span>
                        <span id="incentiveResult">₹0</span>
                    </div>
                    <div class="calc-total">
                        <span>ESTIMATED TOTAL</span>
                        <span>₹15,000+</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav sales-nav">
        <a href="dashboard.html" class="bnav-item">
            <i class="fas fa-home bnav-icon"></i>
            <span class="bnav-label">Home</span>
        </a>
        <a href="onboarding.html" class="bnav-item" data-module="onboarding">
            <i class="fas fa-plus-circle bnav-icon"></i>
            <span class="bnav-label">Onboard</span>
        </a>
        <a href="tracking.html" class="bnav-item" data-module="tracking">
            <i class="fas fa-map-marker-alt bnav-icon"></i>
            <span class="bnav-label">Tracking</span>
        </a>
        <a href="targets.html" class="bnav-item active" data-module="targets">
            <i class="fas fa-award bnav-icon"></i>
            <span class="bnav-label">Incentives</span>
        </a>
    </nav>

    <script src="../assets/js/salesteam.js"></script>
</body>

</html>
